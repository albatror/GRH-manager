<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRH Manager V4 - Dynamique</title>
<!-- SheetJS : lecture des fichiers Excel uniquement -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<!-- JSZip : écriture directe dans le ZIP/XML pour préserver les styles à 100% -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<!-- Chart.js pour les graphiques de synthèse -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f1117;--surface:#181c27;--surface2:#1e2336;--surface3:#252c42;
  --border:#2e3650;--text:#e8ecf5;--text-muted:#7a869c;--text-dim:#4a5570;
  --accent:#4f8ef7;--accent-soft:rgba(79,142,247,.12);
  --green:#2ecc7a;--green-soft:rgba(46,204,122,.12);
  --orange:#f7943a;--orange-soft:rgba(247,148,58,.12);
  --red:#f74f4f;--red-soft:rgba(247,79,79,.12);
  --yellow:#f7d14f;--yellow-soft:rgba(247,209,79,.12);
  --purple:#c07ef7;--purple-soft:rgba(192,126,247,.12);
  --r:8px;--rl:14px;--font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
}
/* ── THÈME CLAIR ── */
[data-theme="light"]{
  --bg:#f0f2f7;--surface:#ffffff;--surface2:#f5f6fa;--surface3:#e8eaf0;
  --border:#d0d4e0;--text:#1a1e2e;--text-muted:#5a6280;--text-dim:#9aa0b8;
  --accent:#2563eb;--accent-soft:rgba(37,99,235,.1);
  --green:#059669;--green-soft:rgba(5,150,105,.1);
  --orange:#d97706;--orange-soft:rgba(217,119,6,.1);
  --red:#dc2626;--red-soft:rgba(220,38,38,.1);
  --yellow:#b45309;--yellow-soft:rgba(180,83,9,.1);
  --purple:#7c3aed;--purple-soft:rgba(124,58,237,.1);
}
/* ── THÈME BLEU PROFESSIONNEL ── */
[data-theme="blue"]{
  --bg:#0a1628;--surface:#0f2040;--surface2:#162a52;--surface3:#1d3464;
  --border:#1e3d6e;--text:#d8e8ff;--text-muted:#7a9acc;--text-dim:#3a5880;
  --accent:#38bdf8;--accent-soft:rgba(56,189,248,.12);
  --green:#34d399;--green-soft:rgba(52,211,153,.12);
  --orange:#fb923c;--orange-soft:rgba(251,146,60,.12);
  --red:#f87171;--red-soft:rgba(248,113,113,.12);
  --yellow:#fbbf24;--yellow-soft:rgba(251,191,36,.12);
  --purple:#a78bfa;--purple-soft:rgba(167,139,250,.12);
}
.theme-swatch{width:28px;height:28px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:all .2s;display:inline-block;flex-shrink:0}
.theme-swatch.active{border-color:var(--accent);transform:scale(1.15)}
.theme-swatch:hover{transform:scale(1.1)}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px}
#app{display:flex;height:100vh;overflow:hidden}

/* ── SIDEBAR ── */
#sidebar{width:260px;min-width:260px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
#sb-head{padding:14px 14px 10px;border-bottom:1px solid var(--border)}
#sb-head h1{font-size:12px;font-weight:700;color:var(--accent);letter-spacing:.08em;text-transform:uppercase}
#sb-head p{font-size:10.5px;color:var(--text-muted);margin-top:2px}
#sb-files{padding:10px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:5px}
.save-btn{display:flex;align-items:center;justify-content:center;gap:5px;padding:8px;border-radius:var(--r);border:none;background:var(--accent);color:#fff;cursor:pointer;font-size:11px;font-weight:600;transition:all .15s;font-family:var(--font)}
.save-btn:hover{background:#3a7de8}.save-btn:disabled{opacity:.4;cursor:not-allowed}
#sb-nav{flex:1;overflow-y:auto;padding:6px 0}
.nav-group{margin-bottom:10px}
.nav-group-label{font-size:9.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);padding:8px 14px 3px; border-bottom: 1px solid var(--border); margin-bottom: 5px;}
.nav-item{display:flex;align-items:center;gap:7px;padding:6px 14px;cursor:pointer;transition:background .15s;font-size:12px;color:var(--text-muted);position:relative}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:var(--accent-soft);color:var(--accent)}
.nav-item.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent);border-radius:0 2px 2px 0}
.nav-item .badge{margin-left:auto;background:var(--surface3);color:var(--text-muted);font-size:9.5px;padding:1px 5px;border-radius:8px;font-family:var(--mono)}
.nav-item.active .badge{background:var(--accent-soft);color:var(--accent)}
.nav-dot{width:5px;height:5px;border-radius:50%;background:var(--text-dim);flex-shrink:0}
.nav-item.active .nav-dot{background:var(--accent)}

/* ── MAIN ── */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:10px;flex-shrink:0}
#topbar h2{font-size:14px;font-weight:600;flex:1}
#content{flex:1;overflow-y:auto}

/* ── DASHBOARD & SUMMARY ── */
#dashboard, #summary-page{padding:20px}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:15px;margin-bottom:20px}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:16px;position:relative;overflow:hidden}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.kpi-card.blue::before{background:var(--accent)}
.kpi-card.green::before{background:var(--green)}
.kpi-card.purple::before{background:var(--purple)}
.kpi-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);margin-bottom:5px}
.kpi-value{font-size:28px;font-weight:700;font-family:var(--mono)}
.kpi-sub{font-size:11px;color:var(--text-muted);margin-top:4px}
.dash-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:18px;margin-bottom:15px}
.dash-card-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);margin-bottom:15px;display:flex;align-items:center;gap:8px}

/* ── TABLE ── */
#table-panel{display:flex;flex-direction:column;height:100%}
.table-toolbar{padding:12px 20px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0}
.search-wrap{position:relative;flex:1;max-width:300px}
.search-wrap input{width:100%;padding:7px 10px 7px 30px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-family:var(--font);font-size:12.5px}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:12px}
.table-wrap{flex:1;overflow:auto}
table{width:100%;border-collapse:collapse}
thead tr{background:var(--surface);position:sticky;top:0;z-index:5}
thead th{padding:10px 14px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text-muted);border-bottom:1px solid var(--border);white-space:nowrap}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
tbody tr:hover{background:var(--surface2)}
tbody td{padding:10px 14px;font-size:12.5px;white-space:nowrap;max-width:250px;overflow:hidden;text-overflow:ellipsis}

/* ── MODAL ── */
#modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;align-items:center;justify-content:center}
#modal-overlay.open{display:flex}
#modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);width:720px;max-width:96vw;max-height:90vh;display:flex;flex-direction:column}
#modal-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
#modal-body{flex:1;overflow-y:auto;padding:20px}
#modal-footer{padding:15px 20px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end}
.btn{padding:8px 16px;border-radius:var(--r);border:none;cursor:pointer;font-family:var(--font);font-size:12px;font-weight:500;transition:all .15s;display:flex;align-items:center;gap:5px}
.btn-primary{background:var(--accent);color:#fff}
.btn-ghost{background:transparent;color:var(--text-muted);border:1px solid var(--border)}
.btn-danger{background:var(--red-soft);color:var(--red);border:1px solid rgba(247,79,79,.2)}

#notify{position:fixed;bottom:20px;right:20px;z-index:300;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:10px 15px;font-size:12.5px;display:none;align-items:center;gap:8px;box-shadow:0 4px 20px rgba(0,0,0,.4)}
#notify.show{display:flex}
#dirty-indicator{display:none;align-items:center;gap:5px;padding:3px 8px;border-radius:var(--r);background:var(--orange-soft);border:1px solid rgba(247,148,58,.3);font-size:10px;color:var(--orange);font-weight:600;margin-top:5px}

.chart-container{height:300px;position:relative;margin-bottom:20px}
</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <div id="sb-head">
      <h1>GRH Manager V4</h1>
      <p>Analyse Dynamique Excel</p>
    </div>
    <div id="sb-files">
      <button class="save-btn" onclick="pickFiles()">📂 Charger des fichiers Excel</button>
      <button class="save-btn" id="save-all-btn" onclick="saveAllFiles()" disabled style="background:var(--green);margin-top:5px">💾 Enregistrer tout</button>
      <div id="dirty-indicator"><span>●</span><span>Modifications en attente</span></div>
    </div>
    <div id="sb-nav">
      <div class="nav-group">
        <div class="nav-group-label">Vue générale</div>
        <div class="nav-item active" data-view="dashboard" onclick="setView('dashboard',this)"><div class="nav-dot"></div>Tableau de bord</div>
        <div class="nav-item" data-view="summary" onclick="setView('summary',this)"><div class="nav-dot"></div>Synthèse intelligente</div>
      </div>
      <div id="dynamic-nav"></div>
      <div class="nav-group">
        <div class="nav-group-label">Système</div>
        <div class="nav-item" data-view="admin" onclick="setView('admin',this)"><div class="nav-dot"></div>⚙ Administration</div>
      </div>
    </div>
  </div>
  <div id="main">
    <div id="topbar">
      <h2 id="topbar-title">Tableau de bord</h2>
      <div id="topbar-extra"></div>
      <div style="display:flex;gap:7px">
        <button class="btn btn-ghost" onclick="exportCSV()" id="btn-export" style="display:none">⬇ CSV</button>
        <button class="btn btn-primary" onclick="openAddModal()" id="btn-add" style="display:none">+ Ajouter</button>
      </div>
    </div>
    <div id="content"></div>
  </div>
</div>

<div id="modal-overlay">
  <div id="modal">
    <div id="modal-header"><h3 id="modal-title"></h3><button class="btn btn-ghost" onclick="closeModal()" style="padding:3px 8px;margin-left:auto">✕</button></div>
    <div id="modal-body"></div>
    <div id="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Annuler</button>
      <button class="btn btn-primary" id="modal-save-btn" onclick="saveModal()">Enregistrer</button>
    </div>
  </div>
</div>
<div id="notify"><span id="notify-text"></span></div>

<script>
// ═══════════════════════════════════════════════════════════
// ÉTAT GLOBAL
// ═══════════════════════════════════════════════════════════
let DB = {}; // Structure: DB[fileName][sheetName] = [records]
let FILES = {}; // Structure: FILES[fileName] = { zip, wb, lastModified, handle }
let SCHEMAS = {}; // Structure: SCHEMAS[fileName][sheetName] = { fields, cols, headerIdx }
let ADMIN = loadAdminConfig();
let nextId = 1, currentView = 'dashboard', searchQuery = '';
let editingId = null;
let dirtyFiles = new Set();
let charts = [];

function loadAdminConfig() {
  try { return JSON.parse(localStorage.getItem('grh_v4_config') || 'null') || { theme:'dark', visibleCols:{} }; }
  catch { return { theme:'dark', visibleCols:{} }; }
}
function saveAdminConfig() { localStorage.setItem('grh_v4_config', JSON.stringify(ADMIN)); }

// ═══════════════════════════════════════════════════════════
// CHARGEMENT & ANALYSE DYNAMIQUE
// ═══════════════════════════════════════════════════════════
async function pickFiles() {
  if (window.showOpenFilePicker) {
    try {
      const handles = await window.showOpenFilePicker({
        types: [{ description: 'Excel', accept: { 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet': ['.xlsx'] } }],
        multiple: true
      });
      for (const h of handles) {
        const file = await h.getFile();
        await processFile(await file.arrayBuffer(), file.name, h);
      }
    } catch (e) { if (e.name !== 'AbortError') notify('⚠ ' + e.message); }
  } else {
    const inp = document.createElement('input'); inp.type = 'file'; inp.accept = '.xlsx'; inp.multiple = true;
    inp.onchange = async () => { for (const f of inp.files) await processFile(await f.arrayBuffer(), f.name, null); };
    inp.click();
  }
}

async function processFile(buf, name, handle) {
  try {
    const wb = XLSX.read(buf, { type: 'array', cellDates: true, cellFormula: true });
    const zip = await JSZip.loadAsync(buf);
    FILES[name] = { zip, wb, handle, lastModified: Date.now() };
    DB[name] = {}; SCHEMAS[name] = {};

    const nameToPath = await getSheetPathMap(zip);

    for (const sn of wb.SheetNames) {
      if (sn.toLowerCase().includes('param')) continue;
      const ws = wb.Sheets[sn];
      const raw = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '', cellDates: true });
      if (raw.length === 0) continue;

      let hIdx = 0;
      for (let i = 0; i < Math.min(raw.length, 10); i++) { if (raw[i] && raw[i].some(c => c !== '')) { hIdx = i; break; } }

      const headerRow = raw[hIdx];
      const colMap = {};
      const headerMeta = {};

      const path = nameToPath[sn];
      const wsDoc = path ? await getXmlDom(zip, path) : null;
      const xmlCellStyles = {};
      if (wsDoc) {
        const rows = wsDoc.getElementsByTagName('row');
        for (let i=0; i<rows.length; i++) {
          const cells = rows[i].getElementsByTagName('c');
          for (let j=0; j<cells.length; j++) {
            xmlCellStyles[cells[j].getAttribute('r')] = cells[j].getAttribute('s');
          }
        }
      }

      headerRow.forEach((h, i) => {
        if (h) {
          const key = String(h).trim();
          colMap[i] = key;
          const addr = XLSX.utils.encode_cell({ r: hIdx, c: i });
          headerMeta[key] = { s: xmlCellStyles[addr] };
        }
      });

      const fields = Object.values(colMap).map(k => ({ key: k, label: k, type: isDateCol(k) ? 'date' : 'text' }));
      SCHEMAS[name][sn] = { title: sn, fields, cols: Object.values(colMap).slice(0, 10), headerIdx: hIdx, colMap, headerMeta };

      const records = [];
      for (let i = hIdx + 1; i < raw.length; i++) {
        const row = raw[i];
        if (!row || row.every(c => c === '')) continue;
        const obj = { id: nextId++, __meta: {} };
        Object.entries(colMap).forEach(([idx, key]) => {
          const cIdx = parseInt(idx);
          const addr = XLSX.utils.encode_cell({ r: i, c: cIdx });
          const cell = ws[addr];
          obj.__meta[key] = { s: xmlCellStyles[addr], f: cell ? cell.f : null };

          if (cell && cell.f) {
            obj[key] = '=' + cell.f;
          } else {
            let v = raw[i][cIdx];
            if (v instanceof Date) obj[key] = excelDateToISO(v);
            else obj[key] = (v === null || v === undefined) ? '' : String(v).trim();
          }
        });
        records.push(obj);
      }
      DB[name][sn] = records;
    }

    updateDynamicNav();
    notify(`✓ ${name} chargé`);
    renderView();
    document.getElementById('save-all-btn').disabled = false;
  } catch (e) { console.error(e); notify(`⚠ Erreur ${name}: ${e.message}`); }
}

function isDateCol(k) {
  const s = k.toLowerCase();
  return s.includes('date') || s.startsWith('fin') || s.includes('echeance') || s.includes('debut');
}

function excelDateToISO(v) {
  if (!(v instanceof Date)) return v;
  return v.toISOString().split('T')[0];
}

function updateDynamicNav() {
  const container = document.getElementById('dynamic-nav');
  container.innerHTML = '';
  Object.keys(DB).forEach(f => {
    const group = document.createElement('div');
    group.className = 'nav-group';
    group.innerHTML = `<div class="nav-group-label">${f}</div>`;
    Object.keys(DB[f]).forEach(sn => {
      const schema = SCHEMAS[f][sn];
      if (schema.hidden) return;
      const item = document.createElement('div');
      item.className = 'nav-item';
      const vid = `view|${f}|${sn}`;
      item.dataset.view = vid;
      item.innerHTML = `<div class="nav-dot"></div>${sn} <span class="badge">${DB[f][sn].length}</span>`;
      item.onclick = () => setView(vid, item);
      if (currentView === vid) item.classList.add('active');
      group.appendChild(item);
    });
    if (group.children.length > 1) container.appendChild(group);
  });
}

// ═══════════════════════════════════════════════════════════
// VUES (DASHBOARD, SUMMARY, TABLE)
// ═══════════════════════════════════════════════════════════
function setView(v, el) {
  currentView = v; searchQuery = '';
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  if (el) el.classList.add('active');
  renderView();
}

function renderView() {
  const c = document.getElementById('content'), tt = document.getElementById('topbar-title');
  const ba = document.getElementById('btn-add'), be = document.getElementById('btn-export');
  charts.forEach(chart => chart.destroy()); charts = [];

  if (currentView === 'dashboard') {
    tt.textContent = 'Tableau de bord'; ba.style.display = 'none'; be.style.display = 'none';
    c.innerHTML = renderDashboardV4();
  } else if (currentView === 'summary') {
    tt.textContent = 'Synthèse intelligente'; ba.style.display = 'none'; be.style.display = 'none';
    c.innerHTML = renderSummaryV4();
    setTimeout(initCharts, 100);
  } else if (currentView === 'admin') {
    tt.textContent = 'Administration'; ba.style.display = 'none'; be.style.display = 'none';
    c.innerHTML = renderAdminV4();
  } else if (currentView.startsWith('view|')) {
    const [, f, sn] = currentView.split('|');
    tt.textContent = `${f} > ${sn}`; ba.style.display = 'flex'; be.style.display = 'flex';
    c.innerHTML = renderTableV4(f, sn);
  }
}

function collectAllAlertsV4() {
  const alerts = [];
  const today = new Date();
  const horizon = 60; // 2 mois pour les alertes de début/fin

  const diff = d => {
    if (!d) return null;
    const x = new Date(d);
    return isNaN(x) ? null : Math.round((x - today) / 86400000);
  };

  Object.keys(DB).forEach(f => {
    Object.keys(DB[f]).forEach(sn => {
      const data = DB[f][sn];
      const schema = SCHEMAS[f][sn];
      const dateFields = schema.fields.filter(fi => fi.type === 'date');

      data.forEach(row => {
        dateFields.forEach(df => {
          const d = diff(row[df.key]);
          if (d !== null && d >= -10 && d < horizon) {
            const isStart = df.label.toLowerCase().includes('debut') || df.label.toLowerCase().includes('entree') || df.label.toLowerCase().includes('nomination');
            alerts.push({
              f, sn,
              id: row.id,
              name: row.Nom || row.NOM || row.matricule || 'Sans nom',
              label: df.label,
              date: row[df.key],
              diff: d,
              isStart,
              urgency: d < 0 ? 'past' : d < 7 ? 'immediate' : d < 30 ? 'warning' : 'info'
            });
          }
        });
      });
    });
  });
  return alerts.sort((a, b) => a.diff - b.diff);
}

function renderDashboardV4() {
  const files = Object.keys(DB);
  if (!files.length) return `<div class="empty-state"><div class="es-icon">📂</div><h2>Aucun fichier</h2><p>Chargez des fichiers Excel pour commencer.</p></div>`;

  let totalRows = 0, totalSheets = 0;
  files.forEach(f => Object.keys(DB[f]).forEach(sn => { totalRows += DB[f][sn].length; totalSheets++; }));

  const alerts = collectAllAlertsV4();

  return `<div id="dashboard">
    <div class="kpi-grid">
      <div class="kpi-card blue"><div class="kpi-label">Fichiers</div><div class="kpi-value">${files.length}</div></div>
      <div class="kpi-card green"><div class="kpi-label">Onglets</div><div class="kpi-value">${totalSheets}</div></div>
      <div class="kpi-card purple"><div class="kpi-label">Entrées</div><div class="kpi-value">${totalRows}</div></div>
      <div class="kpi-card orange"><div class="kpi-label">Alertes</div><div class="kpi-value">${alerts.length}</div></div>
    </div>

    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px">
      <div class="dash-card">
        <div class="dash-card-title">🚀 Prochains évènements (Débuts)</div>
        <div style="display:flex; flex-direction:column; gap:8px">
          ${alerts.filter(a => a.isStart).slice(0, 10).map(a => `
            <div style="display:flex; align-items:center; padding:8px; background:var(--surface2); border-radius:5px; gap:10px; cursor:pointer" onclick="setView('view|${a.f}|${a.sn}')">
              <div style="width:4px; height:25px; background:var(--green); border-radius:2px"></div>
              <div style="flex:1">
                <div style="font-size:12px; font-weight:600">${a.name}</div>

function initCharts() {
  if (summaryMode !== 'graph') return;
  Object.keys(DB).forEach(f => {
    Object.keys(DB[f]).forEach(sn => {
      const canvas = document.getElementById(`chart|${f}|${sn}`);
      if (!canvas) return;
      const data = DB[f][sn];
      const schema = SCHEMAS[f][sn];

      // Recherche d'un champ pertinent pour le groupement
      let groupField = schema.fields.find(fi =>
        fi.key.toLowerCase().includes('type') ||
        fi.key.toLowerCase().includes('pole') ||
        fi.key.toLowerCase().includes('statut') ||
        fi.key.toLowerCase().includes('grade') ||
        fi.key.toLowerCase().includes('motif')
      );
      if (!groupField) groupField = schema.fields[0];

      const counts = {};
      data.forEach(r => {
        let v = String(r[groupField.key] || 'N/A').trim();
        if (v.length > 20) v = v.substring(0, 17) + '...';
        counts[v] = (counts[v] || 0) + 1;
      });

      // Trier par valeur décroissante et limiter à 10 pour la lisibilité
      const sortedLabels = Object.keys(counts).sort((a, b) => counts[b] - counts[a]).slice(0, 10);
      const sortedData = sortedLabels.map(l => counts[l]);

      const colors = ['#4f8ef7', '#2ecc7a', '#f7943a', '#f74f4f', '#c07ef7', '#f7d14f', '#00cfd5', '#ff7eb9', '#7afcff', '#feff9c'];

      const chart = new Chart(canvas, {
        type: 'doughnut',
        data: {
          labels: sortedLabels,
          datasets: [{
            data: sortedData,
            backgroundColor: colors,
            borderColor: 'var(--surface)',
            borderWidth: 2
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          cutout: '60%',
          plugins: {
            legend: {
              position: 'right',
              labels: { color: '#7a869c', font: { size: 10, family: 'DM Sans' }, usePointStyle: true, padding: 10 }
            },
            title: {
              display: true,
              text: `Répartition par ${groupField.label}`,
              color: '#7a869c',
              font: { size: 11, weight: 'bold' },
              padding: { bottom: 10 }
            }
          }
        }
      });
      charts.push(chart);
    });
  });
}

function openEditModalV4(id) {

function deleteRowV4(id) {
  if (!confirm('Supprimer cet enregistrement ?')) return;
  const [, f, sn] = currentView.split('|');
  DB[f][sn] = DB[f][sn].filter(r => r.id !== id);
  markDirty(f); renderView(); updateDynamicNav();
}

function saveModal() {
  const [, f, sn] = currentView.split('|');
  const data = DB[f][sn], schema = SCHEMAS[f][sn];

  const obj = editingId ? data.find(r => r.id === editingId) : { id: nextId++, __meta: {} };
  schema.fields.forEach(fi => {
    const val = document.getElementById(`edit|${fi.key}`).value;
    obj[fi.key] = val;
    // Si c'est un nouveau champ pour cet objet, s'assurer que __meta existe
    if (!obj.__meta) obj.__meta = {};
    if (!obj.__meta[fi.key]) obj.__meta[fi.key] = { s: "0" };
  });

  if (!editingId) data.push(obj);

  markDirty(f); closeModal(); renderView(); updateDynamicNav();
}

function markDirty(f) {
  dirtyFiles.add(f);
  document.getElementById('dirty-indicator').style.display = 'flex';
}

async function saveAllFiles() {
  const btn = document.getElementById('save-all-btn');
  btn.disabled = true; btn.textContent = 'Enregistrement...';

  try {
    for (const f of dirtyFiles) {
      const file = FILES[f];
      const zip = file.zip;

      let ssDoc = await getXmlDom(zip, 'xl/sharedStrings.xml');
      if (!ssDoc) ssDoc = new DOMParser().parseFromString('<?xml version="1.0" encoding="UTF-8" standalone="yes"?><sst xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" count="0" uniqueCount="0"></sst>', 'application/xml');
      const sst = ssDoc.documentElement;

      function getOrCreateSst(val) {
        const sVal = String(val);
        const siTags = sst.getElementsByTagName('si');
        for(let i=0; i<siTags.length; i++) {
          const t = siTags[i].getElementsByTagName('t')[0];
          if (t && t.textContent === sVal) return i;
        }
        const newSi = ssDoc.createElementNS(sst.namespaceURI, 'si');
        const newT = ssDoc.createElementNS(sst.namespaceURI, 't');
        newT.textContent = sVal;
        newSi.appendChild(newT);
        sst.appendChild(newSi);
        return siTags.length - 1;
      }

      const wbDoc = await getXmlDom(zip, 'xl/workbook.xml');
      const relsDoc = await getXmlDom(zip, 'xl/_rels/workbook.xml.rels');
      const ctDoc = await getXmlDom(zip, '[Content_Types].xml');

      const sheetsNode = wbDoc.getElementsByTagName('sheets')[0];
      const currentSheetsInWb = Array.from(sheetsNode.getElementsByTagName('sheet'));
      const dbSheets = Object.keys(DB[f]);

      currentSheetsInWb.forEach(sNode => {
        if (!dbSheets.includes(sNode.getAttribute('name'))) {
          const rId = sNode.getAttribute('r:id');
          sheetsNode.removeChild(sNode);
          // Nettoyer les relations
          const relNode = Array.from(relsDoc.getElementsByTagName('Relationship')).find(r => r.getAttribute('Id') === rId);
          if (relNode) {
            const target = relNode.getAttribute('Target');
            relsDoc.documentElement.removeChild(relNode);
            // Optionnel : supprimer le fichier du zip
            const fullPath = target.startsWith('worksheets/') ? 'xl/' + target : target;
            zip.remove(fullPath);
            // Nettoyer [Content_Types].xml
            const partName = (fullPath.startsWith('/') ? '' : '/') + fullPath;
            const ctOverride = Array.from(ctDoc.getElementsByTagName('Override')).find(o => o.getAttribute('PartName') === partName);
            if (ctOverride) ctDoc.documentElement.removeChild(ctOverride);
          }
        }
      });

      for (const sn of dbSheets) {
        const schema = SCHEMAS[f][sn];
        let sNode = currentSheetsInWb.find(n => n.getAttribute('name') === sn);
        let path;

        if (!sNode) {
          const sheetId = Math.max(0, ...Array.from(wbDoc.getElementsByTagName('sheet')).map(n => parseInt(n.getAttribute('sheetId') || 0))) + 1;
          const rId = "rId" + (Math.max(0, ...Array.from(relsDoc.getElementsByTagName('Relationship')).map(n => {
            const id = n.getAttribute('Id');
            return (id && id.startsWith('rId')) ? parseInt(id.replace('rId', '')) : 0;
          })) + 1);

          sNode = wbDoc.createElementNS(sheetsNode.namespaceURI, 'sheet');
          sNode.setAttribute('name', sn); sNode.setAttribute('sheetId', sheetId); sNode.setAttribute('r:id', rId);
          sheetsNode.appendChild(sNode);

          path = `xl/worksheets/sheet${sheetId}.xml`;
          const rel = relsDoc.createElementNS(relsDoc.documentElement.namespaceURI, 'Relationship');
          rel.setAttribute('Id', rId); rel.setAttribute('Type', "http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet"); rel.setAttribute('Target', `worksheets/sheet${sheetId}.xml`);
          relsDoc.documentElement.appendChild(rel);

          const partName = `/${path}`;
          let override = Array.from(ctDoc.getElementsByTagName('Override')).find(o => o.getAttribute('PartName') === partName);
          if (!override) {
            override = ctDoc.createElementNS(ctDoc.documentElement.namespaceURI, 'Override');
            override.setAttribute('PartName', partName); override.setAttribute('ContentType', "application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml");
            ctDoc.documentElement.appendChild(override);
          }

          zip.file(path, `<?xml version="1.0" encoding="UTF-8" standalone="yes"?><worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"><sheetData/></worksheet>`);
        } else {
          const rId = sNode.getAttribute('r:id');
          const relNode = Array.from(relsDoc.getElementsByTagName('Relationship')).find(r => r.getAttribute('Id') === rId);
          path = 'xl/' + relNode.getAttribute('Target');
        }

        if (schema.hidden) sNode.setAttribute('state', 'hidden'); else sNode.removeAttribute('state');
        const wsDoc = await getXmlDom(zip, path);
        updateWorksheetDom(wsDoc, DB[f][sn], schema, getOrCreateSst);
        zip.file(path, new XMLSerializer().serializeToString(wsDoc));
      }

      zip.file('xl/workbook.xml', new XMLSerializer().serializeToString(wbDoc));
      zip.file('xl/_rels/workbook.xml.rels', new XMLSerializer().serializeToString(relsDoc));
      zip.file('[Content_Types].xml', new XMLSerializer().serializeToString(ctDoc));
      zip.file('xl/sharedStrings.xml', new XMLSerializer().serializeToString(ssDoc));

      const buf = await zip.generateAsync({ type: 'arraybuffer', compression: 'DEFLATE' });
      await writeFileV4(buf, file.handle, f);
    }
    dirtyFiles.clear(); document.getElementById('dirty-indicator').style.display = 'none';
    notify('✓ Sauvegarde réussie');
  } catch (err) { console.error(err); notify('⚠ Erreur: ' + err.message); }
  finally { btn.disabled = false; btn.textContent = '💾 Enregistrer tout'; }
}

async function getXmlDom(zip, path) {
  const file = zip.file(path); if (!file) return null;
  return new DOMParser().parseFromString(await file.async('text'), 'application/xml');
}

function updateWorksheetDom(doc, records, schema, getOrCreateSst) {
  const ns = "http://schemas.openxmlformats.org/spreadsheetml/2006/main";
  let sheetData = doc.getElementsByTagName('sheetData')[0];
  if (!sheetData) { sheetData = doc.createElementNS(ns, 'sheetData'); doc.documentElement.appendChild(sheetData); }
  while (sheetData.firstChild) sheetData.removeChild(sheetData.firstChild);

  let colsNode = doc.getElementsByTagName('cols')[0];
  if (colsNode) colsNode.parentNode.removeChild(colsNode);
  colsNode = doc.createElementNS(ns, 'cols');
  schema.fields.forEach((fi, i) => {
    const col = doc.createElementNS(ns, 'col'); col.setAttribute('min', i + 1); col.setAttribute('max', i + 1); col.setAttribute('width', '15');
    if (schema.cols && !schema.cols.includes(fi.key)) col.setAttribute('hidden', '1');
    colsNode.appendChild(col);
  });
  // Insérer cols avant sheetData s'il y a des colonnes
  if (schema.fields.length > 0) {
    doc.documentElement.insertBefore(colsNode, sheetData);
  }

  const hRow = doc.createElementNS(ns, 'row'); const hIdx = (schema.headerIdx || 0) + 1; hRow.setAttribute('r', hIdx);
  schema.fields.forEach((fi, ci) => {
    const cell = doc.createElementNS(ns, 'c'); cell.setAttribute('r', idxToCol(ci) + hIdx); cell.setAttribute('t', 's');
    if (schema.headerMeta && schema.headerMeta[fi.key]?.s) cell.setAttribute('s', schema.headerMeta[fi.key].s);
    const v = doc.createElementNS(ns, 'v'); v.textContent = getOrCreateSst(fi.key); cell.appendChild(v); hRow.appendChild(cell);
  });
  sheetData.appendChild(hRow);

  records.forEach((rec, ri) => {
    const row = doc.createElementNS(ns, 'row'); const rIdx = hIdx + 1 + ri; row.setAttribute('r', rIdx);
    schema.fields.forEach((fi, ci) => {
      const cell = doc.createElementNS(ns, 'c'); cell.setAttribute('r', idxToCol(ci) + rIdx);
      if (rec.__meta?.[fi.key]?.s) cell.setAttribute('s', rec.__meta[fi.key].s);
      const val = rec[fi.key];
      if (val && String(val).startsWith('=') && !String(val).startsWith('==')) {
        const f = doc.createElementNS(ns, 'f'); f.textContent = String(val).substring(1); cell.appendChild(f);
      } else if (val !== undefined && val !== null && val !== '') {
        cell.setAttribute('t', 's'); const v = doc.createElementNS(ns, 'v'); v.textContent = getOrCreateSst(val); cell.appendChild(v);
      }
      row.appendChild(cell);
    });
    sheetData.appendChild(row);
  });
}

function idxToCol(n) { let s = ''; n++; while (n > 0) { const r = (n - 1) % 26; s = String.fromCharCode(65 + r) + s; n = Math.floor((n - 1) / 26); } return s; }

async function getSheetPathMap(zip) {
  const wbXml = await zip.files['xl/workbook.xml'].async('text');
  const relsXml = await zip.files['xl/_rels/workbook.xml.rels'].async('text');
  const nameToRid = {}, relMap = {};
  let m;
  const sr = /<sheet name="([^"]*)" sheetId="\d+" r:id="([^"]*)"/g;
  while ((m = sr.exec(wbXml)) !== null) nameToRid[m[1]] = m[2];
  const rr = /<Relationship Id="([^"]*)"[^>]*Target="([^"]*)"/g;
  while ((m = rr.exec(relsXml)) !== null) relMap[m[1]] = m[2];
  const res = {};
  Object.entries(nameToRid).forEach(([n, rid]) => res[n] = 'xl/' + relMap[rid]);
  return res;
}

async function writeFileV4(buf, handle, defaultName) {
  if (handle && handle.createWritable) {
    const w = await handle.createWritable(); await w.write(new Blob([buf])); await w.close();
  } else {
    const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([buf])); a.download = defaultName; a.click();
  }
}

                  </div>
                </div>
              </details>`;
            }).join('')}
          </div>
        </div>
      `).join('')}
    </div>
    <div class="admin-section">
      <div class="admin-section-title">Thème de l'interface</div>
      <div style="display:flex;gap:10px">
        <button class="btn btn-ghost" onclick="applyThemeV4('dark')">Sombre</button>
        <button class="btn btn-ghost" onclick="applyThemeV4('light')">Clair</button>
        <button class="btn btn-ghost" onclick="applyThemeV4('blue')">Bleu professionnel</button>
      </div>
    </div>
  </div>`;
}

function toggleColV4(f, sn, key) {
  const schema = SCHEMAS[f][sn];
  if (schema.cols.includes(key)) {
    schema.cols = schema.cols.filter(c => c !== key);
  } else {
    schema.cols.push(key);
  }
  saveAdminConfig();
  markDirty(f);
  if (currentView === `view|${f}|${sn}`) renderView();
}

function moveColV4(f, sn, idx, dir) {
  const schema = SCHEMAS[f][sn];
  const target = idx + dir;
  if (target < 0 || target >= schema.fields.length) return;
  const temp = schema.fields[idx];
  schema.fields[idx] = schema.fields[target];
  schema.fields[target] = temp;
  markDirty(f);
  renderView();
}

function applyThemeV4(t) {
  document.documentElement.setAttribute('data-theme', t === 'dark' ? '' : t);
  ADMIN.theme = t;
  saveAdminConfig();
}

function removeFileV4(f) {
  if (confirm(`Retirer le fichier ${f} ?`)) {
    delete DB[f]; delete FILES[f]; delete SCHEMAS[f];
    updateDynamicNav(); renderView();
  }
}

function addSheetV4(f) {
  const name = prompt("Nom du nouvel onglet :");
  if (!name) return;
  if (DB[f][name]) { notify("⚠ Cet onglet existe déjà"); return; }
  DB[f][name] = [];
  SCHEMAS[f][name] = { title: name, fields: [{key:'Nom', label:'Nom', type:'text'}], cols: ['Nom'], headerIdx: 0, colMap: {0:'Nom'} };
  markDirty(f); updateDynamicNav(); renderView();
}

function deleteSheetV4(f, sn) {
  if (!confirm(`Supprimer l'onglet ${sn} ?`)) return;
  delete DB[f][sn];
  delete SCHEMAS[f][sn];
  markDirty(f); updateDynamicNav(); renderView();
}

function toggleSheetVisibilityV4(f, sn) {
  SCHEMAS[f][sn].hidden = !SCHEMAS[f][sn].hidden;
  markDirty(f); updateDynamicNav(); renderView();
}

function addColumnV4(f, sn) {
  const label = prompt("Nom de la nouvelle colonne :");
  if (!label) return;
  const key = label.trim();
  const schema = SCHEMAS[f][sn];
  if (schema.fields.some(fi => fi.key === key)) { notify("⚠ Cette colonne existe déjà"); return; }

  const type = isDateCol(key) ? 'date' : 'text';
  schema.fields.push({ key, label: key, type });
  schema.cols.push(key);

  // Initialiser la métadonnée pour les enregistrements existants
  DB[f][sn].forEach(r => {
    if (!r.__meta) r.__meta = {};
    r.__meta[key] = { s: "0" };
  });

  // Mettre à jour colMap
  const nextIdx = Math.max(...Object.keys(schema.colMap).map(Number)) + 1;
  schema.colMap[nextIdx] = key;

  markDirty(f); renderView();
}

function deleteColV4(f, sn, key) {
  if (!confirm(`Supprimer la colonne ${key} ?`)) return;
  const schema = SCHEMAS[f][sn];
  schema.fields = schema.fields.filter(fi => fi.key !== key);
  schema.cols = schema.cols.filter(c => c !== key);

  // Mettre à jour colMap
  Object.keys(schema.colMap).forEach(idx => {
    if (schema.colMap[idx] === key) delete schema.colMap[idx];
  });

  // Nettoyer les données
  DB[f][sn].forEach(r => {
    delete r[key];
    if (r.__meta) delete r.__meta[key];
  });

  markDirty(f); renderView();
}

function exportCSV() {
  const [, f, sn] = currentView.split('|');
  const data = DB[f][sn], schema = SCHEMAS[f][sn];
  const csv = [schema.fields.map(fi => fi.label).join(';'), ...data.map(r => schema.fields.map(fi => `"${r[fi.key]||''}"`).join(';'))].join('\n');
  const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob(['\uFEFF' + csv], { type: 'text/csv' })); a.download = `${sn}.csv`; a.click();
}

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
renderView();
</script>
